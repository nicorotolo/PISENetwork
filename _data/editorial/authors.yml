alauricellapivasu:
  name:    "Andreea Lauricella Pivasu"
  avatar:  "/assets/images/team-pictures/placeholder.jpg"
  bio:     "Andreea (Lauricella Pivasu, 2003) is a Master's student in International Relations at Central European University, currently based in Vienna and a PISE alumna. Her research sits at the intersection of international law, cyber studies and international political economy, with a particular focus on how these fields are evolving in an increasingly digital world."
  instagram: https://www.instagram.com/thatgirldreea/
  linkedin: https://www.linkedin.com/in/andreea-lauricella-pivasu-1924b9338/?locale=it 

fgcanestri:
  name:    "Filippo Giorgio Canestri"
  avatar:  "/assets/images/team-pictures/placeholder.jpg"
  bio:     "Hi! I'm Filippo, and I've been in Venice since this year as a PISE student. From what I've studied so far, I'm interested in moral philosophy, the history of sociology, and the history of the anti-colonial struggle in the second half of the twentieth century."
  instagram: https://www.instagram.com/fil.canestri/

asalvalaggio:
